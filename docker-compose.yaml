version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: crypto_gateway_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gateway}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gateway_password}
      POSTGRES_DB: ${POSTGRES_DB:-gateway_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gateway"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gateway_network

volumes:
  postgres_data:

networks:
  gateway_network:
    driver: bridge
